<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Circadian Clock GPT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0c;
      --panel: rgba(18, 18, 24, 0.6);
      --line: rgba(255,255,255,0.08);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.56);
      --gold: #e8d5a3;
      --blue: #4a6fa5;
      --shadow: 0 24px 80px rgba(0,0,0,0.34);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(circle at 50% 12%, rgba(232, 213, 163, 0.11), transparent 24%),
        radial-gradient(circle at 50% 82%, rgba(74, 111, 165, 0.16), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0));
    }

    body::after {
      opacity: 0.08;
      background-image:
        repeating-radial-gradient(circle at 20% 30%, rgba(255,255,255,0.9) 0 0.6px, transparent 0.8px 6px),
        repeating-radial-gradient(circle at 80% 70%, rgba(255,255,255,0.8) 0 0.5px, transparent 0.7px 5px);
      mix-blend-mode: soft-light;
    }

    .app {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 18px 16px calc(144px + var(--safe-bottom));
      isolation: isolate;
    }

    .hud {
      position: absolute;
      top: max(12px, calc(8px + env(safe-area-inset-top, 0px)));
      left: 16px;
      right: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 5;
      pointer-events: none;
    }

    .statusLine {
      pointer-events: auto;
      font-size: 11px;
      line-height: 1.3;
      color: rgba(255,255,255,0.58);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(14, 14, 20, 0.44);
      backdrop-filter: blur(10px);
      max-width: min(74vw, 360px);
    }

    .sheetToggle {
      pointer-events: auto;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(18,18,24,0.58);
      color: var(--text);
      backdrop-filter: blur(14px);
      border-radius: 999px;
      min-width: 46px;
      height: 46px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease;
    }

    .sheetToggle:active { transform: scale(0.98); }

    .clockWrap {
      width: min(100%, 460px);
      aspect-ratio: 0.72;
      display: grid;
      place-items: center;
      position: relative;
      z-index: 1;
    }

    svg {
      width: 100%;
      height: auto;
      overflow: visible;
      filter: drop-shadow(0 22px 80px rgba(0,0,0,0.42));
      touch-action: none;
      user-select: none;
    }

    .legend {
      position: absolute;
      inset: auto 0 18px 0;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 0 6px;
      font-size: 11px;
      color: var(--muted);
      z-index: 2;
      pointer-events: none;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .sheet {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(22,22,30,0.76), rgba(12,12,16,0.62));
      backdrop-filter: blur(18px) saturate(130%);
      box-shadow: var(--shadow);
      transform: translateY(calc(100% - 72px));
      transition: transform 260ms ease;
      overflow: hidden;
    }

    .sheet.open { transform: translateY(0); }

    .sheetHeader {
      padding: 12px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      cursor: pointer;
    }

    .sheetHandle {
      width: 44px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      margin: 0 auto;
    }

    .sheetTitleRow {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    .sheetTitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 27px;
      margin: 0;
    }

    .sheetBody {
      padding: 6px 16px calc(18px + var(--safe-bottom));
      display: grid;
      gap: 16px;
    }

    .row {
      display: grid;
      gap: 10px;
    }

    .rowHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .metric {
      color: var(--text);
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    .valueBig {
      font-size: clamp(30px, 10vw, 44px);
      line-height: 0.9;
      letter-spacing: -0.04em;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #d4c096;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .miniCard {
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      padding: 12px;
    }

    .miniLabel {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .miniValue {
      font-size: 18px;
      line-height: 1.2;
    }

    .hint {
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.025);
      padding: 12px;
    }

    @media (max-width: 480px) and (orientation: portrait) {
      .app {
        padding: 10px 10px calc(186px + var(--safe-bottom));
      }
      .hud {
        top: max(8px, calc(4px + env(safe-area-inset-top, 0px)));
        left: 10px;
        right: 10px;
        gap: 8px;
      }
      .statusLine {
        font-size: 10px;
        padding: 6px 8px;
        color: rgba(255,255,255,0.52);
        border-color: rgba(255,255,255,0.07);
        background: rgba(12, 12, 17, 0.34);
        max-width: min(68vw, 300px);
      }
      .sheetToggle {
        min-width: 40px;
        height: 40px;
        padding: 0 13px;
      }
      .clockWrap {
        width: min(94vw, 360px);
        width: min(94vw, 360px, max(216px, calc((100dvh - 300px) * 0.72)));
        margin-top: 0;
        transform: translateY(28px) scale(0.945);
        transform-origin: center center;
      }
      .legend {
        inset: auto 0 10px 0;
        font-size: 10px;
        padding: 0 2px;
      }
      .legend span {
        padding: 6px 8px;
        border-color: rgba(255,255,255,0.06);
        background: rgba(255,255,255,0.02);
      }
      .sheet {
        bottom: 10px;
        transform: translateY(calc(100% - 68px));
      }
    }

    @media (min-width: 760px) {
      .app {
        padding-bottom: calc(190px + var(--safe-bottom));
      }
      .sheet {
        left: 50%;
        right: auto;
        width: min(680px, calc(100vw - 24px));
        transform: translate(-50%, calc(100% - 78px));
      }
      .sheet.open {
        transform: translate(-50%, 0);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hud">
      <div class="statusLine" id="statusLine">--:--:-- · cycle --h · offset --°</div>
      <button class="sheetToggle" id="sheetToggle" type="button" aria-label="設定を開く">⚙︎</button>
    </div>

    <div class="clockWrap">
      <svg id="clockSvg" viewBox="0 0 360 720" aria-label="縦8の字サーカディアンクロック" role="img">
        <defs>
          <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
          <filter id="tinyGlow" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
          <linearGradient id="goldStroke" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#f5e9c8" />
            <stop offset="100%" stop-color="#d4bb7f" />
          </linearGradient>
          <linearGradient id="blueStroke" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#79a2dd" />
            <stop offset="100%" stop-color="#3d5b88" />
          </linearGradient>
        </defs>

        <g opacity="0.2">
          <circle cx="180" cy="220" r="118" fill="none" stroke="url(#goldStroke)" stroke-width="1.5" />
          <circle cx="180" cy="456" r="118" fill="none" stroke="url(#blueStroke)" stroke-width="1.5" />
        </g>

        <g opacity="0.85">
          <circle cx="180" cy="220" r="118" fill="none" stroke="url(#goldStroke)" stroke-width="10" stroke-linecap="round" filter="url(#softGlow)" />
          <circle cx="180" cy="456" r="118" fill="none" stroke="url(#blueStroke)" stroke-width="10" stroke-linecap="round" filter="url(#softGlow)" />
        </g>

        <g opacity="0.3">
          <line x1="64" y1="338" x2="296" y2="338" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
        </g>

        <g id="labels" font-family="JetBrains Mono, monospace" font-size="13" fill="rgba(255,255,255,0.65)">
          <text x="180" y="76" text-anchor="middle">0</text>
          <text x="314" y="344" text-anchor="middle">6</text>
          <text x="180" y="598" text-anchor="middle">12</text>
          <text x="46" y="344" text-anchor="middle">18</text>
        </g>

        <g id="markers">
          <circle id="zeroHalo" cx="180" cy="102" r="17" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1" />
          <circle id="zeroMarker" cx="180" cy="102" r="9" fill="#0a0a0c" stroke="#ffffff" stroke-width="2.5" filter="url(#tinyGlow)" />
          <text id="zeroText" x="180" y="107" font-family="JetBrains Mono, monospace" font-size="11" fill="rgba(255,255,255,0.92)" text-anchor="middle">0</text>

          <circle id="nowHalo" cx="180" cy="102" r="19" fill="rgba(255,255,255,0.06)" />
          <circle id="nowMarker" cx="180" cy="102" r="11" fill="#ffffff" filter="url(#tinyGlow)" />
          <circle id="nowCore" cx="180" cy="102" r="4" fill="#0a0a0c" />
        </g>
      </svg>

      <div class="legend">
        <span><i class="dot" style="background:#e8d5a3"></i>覚醒ゾーン</span>
        <span><i class="dot" style="background:#4a6fa5"></i>睡眠ゾーン</span>
      </div>
    </div>
  </div>

  <section class="sheet open" id="sheet">
    <div class="sheetHeader" id="sheetHeader" role="button" aria-expanded="true" tabindex="0">
      <div class="sheetHandle"></div>
      <div class="sheetTitleRow">
        <h2 class="sheetTitle">Settings</h2>
        <div class="metric" id="cycleReadout">24.0 h cycle</div>
      </div>
    </div>

    <div class="sheetBody">
      <div class="row">
        <div class="rowHeader">
          <span>現在時刻</span>
          <span class="metric" id="clockReadout">--:--:--</span>
        </div>
        <div class="valueBig" id="phaseReadout">0.0%</div>
      </div>

      <div class="row">
        <div class="rowHeader">
          <span>サイクル時間</span>
          <span class="metric" id="cycleSliderReadout">24.0h</span>
        </div>
        <input id="cycleSlider" type="range" min="15" max="30" step="0.25" value="24" />
      </div>

      <div class="grid2">
        <div class="miniCard">
          <div class="miniLabel">Offset</div>
          <div class="miniValue" id="offsetReadout">0.0%</div>
        </div>
        <div class="miniCard">
          <div class="miniLabel">Zone</div>
          <div class="miniValue" id="zoneReadout">Awake</div>
        </div>
      </div>

      <div class="hint">
        8の字上の <strong>0</strong> マーカーをドラッグすると位相を調整できます。<br />
        スライダーで 15〜30 時間のサイクル長を変更できます。設定はこのブラウザに保存されます。
      </div>
    </div>
  </section>

  <script>
    (() => {
      const STORAGE_KEY = 'circadian-clock-v1';

      const svg = document.getElementById('clockSvg');
      const zeroMarker = document.getElementById('zeroMarker');
      const zeroHalo = document.getElementById('zeroHalo');
      const zeroText = document.getElementById('zeroText');
      const nowMarker = document.getElementById('nowMarker');
      const nowHalo = document.getElementById('nowHalo');
      const nowCore = document.getElementById('nowCore');
      const cycleSlider = document.getElementById('cycleSlider');
      const cycleReadout = document.getElementById('cycleReadout');
      const cycleSliderReadout = document.getElementById('cycleSliderReadout');
      const clockReadout = document.getElementById('clockReadout');
      const phaseReadout = document.getElementById('phaseReadout');
      const offsetReadout = document.getElementById('offsetReadout');
      const zoneReadout = document.getElementById('zoneReadout');
      const statusLine = document.getElementById('statusLine');
      const sheet = document.getElementById('sheet');
      const sheetHeader = document.getElementById('sheetHeader');
      const sheetToggle = document.getElementById('sheetToggle');

      const geometry = {
        upper: { cx: 180, cy: 220, r: 118 },
        lower: { cx: 180, cy: 456, r: 118 },
      };

      const localEpoch = new Date(1970, 0, 1, 0, 0, 0, 0).getTime();

      let state = {
        cycleHours: 24,
        zeroProgress: 0,
        sheetOpen: true,
      };

      let dragging = false;
      let raf = null;

      function load() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const saved = JSON.parse(raw);
          if (typeof saved.cycleHours === 'number') state.cycleHours = clamp(saved.cycleHours, 15, 30);
          if (typeof saved.zeroProgress === 'number') state.zeroProgress = wrap(saved.zeroProgress);
          if (typeof saved.sheetOpen === 'boolean') state.sheetOpen = saved.sheetOpen;
        } catch (_) {}
      }

      function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function wrap(value) {
        return ((value % 1) + 1) % 1;
      }

      function toRad(deg) {
        return (deg * Math.PI) / 180;
      }

      function pointOnCircle(circle, deg) {
        const a = toRad(deg);
        return {
          x: circle.cx + Math.cos(a) * circle.r,
          y: circle.cy + Math.sin(a) * circle.r,
        };
      }

      function pointOnPath(progress) {
        const p = wrap(progress);
        if (p < 0.25) {
          const t = p / 0.25;
          return pointOnCircle(geometry.upper, -90 + t * 180);
        }
        if (p < 0.75) {
          const t = (p - 0.25) / 0.5;
          return pointOnCircle(geometry.lower, -90 - t * 360);
        }
        const t = (p - 0.75) / 0.25;
        return pointOnCircle(geometry.upper, 90 + t * 180);
      }

      function zoneForProgress(progress) {
        const p = wrap(progress);
        return p < 0.25 || p >= 0.75 ? 'Awake' : 'Sleep';
      }

      function colorForProgress(progress) {
        const zone = zoneForProgress(progress);
        return zone === 'Awake' ? '#e8d5a3' : '#4a6fa5';
      }

      function nearestProgressFromPoint(x, y) {
        let bestP = 0;
        let bestD = Infinity;
        const steps = 720;
        for (let i = 0; i <= steps; i += 1) {
          const p = i / steps;
          const pt = pointOnPath(p);
          const dx = pt.x - x;
          const dy = pt.y - y;
          const d = dx * dx + dy * dy;
          if (d < bestD) {
            bestD = d;
            bestP = p;
          }
        }
        return bestP;
      }

      function svgPointFromClient(clientX, clientY) {
        const rect = svg.getBoundingClientRect();
        const viewBox = svg.viewBox.baseVal;
        const scaleX = viewBox.width / rect.width;
        const scaleY = viewBox.height / rect.height;
        return {
          x: (clientX - rect.left) * scaleX + viewBox.x,
          y: (clientY - rect.top) * scaleY + viewBox.y,
        };
      }

      function formatClock(date) {
        return new Intl.DateTimeFormat('ja-JP', {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false,
        }).format(date);
      }

      function updateSheetState() {
        sheet.classList.toggle('open', state.sheetOpen);
        sheetHeader.setAttribute('aria-expanded', String(state.sheetOpen));
      }

      function updateStatic() {
        cycleSlider.value = String(state.cycleHours);
        cycleReadout.textContent = `${state.cycleHours.toFixed(1)} h cycle`;
        cycleSliderReadout.textContent = `${state.cycleHours.toFixed(1)}h`;
        offsetReadout.textContent = `${(state.zeroProgress * 100).toFixed(1)}%`;
        const zeroPt = pointOnPath(state.zeroProgress);
        setMarker(zeroHalo, zeroPt.x, zeroPt.y);
        setMarker(zeroMarker, zeroPt.x, zeroPt.y);
        zeroText.setAttribute('x', zeroPt.x);
        zeroText.setAttribute('y', zeroPt.y + 4);
        updateSheetState();
      }

      function setMarker(el, x, y) {
        el.setAttribute('cx', x);
        el.setAttribute('cy', y);
      }

      function render() {
        const now = new Date();
        const cycleMs = state.cycleHours * 60 * 60 * 1000;
        const elapsedMs = Date.now() - localEpoch;
        const dynamicProgress = wrap(elapsedMs / cycleMs + state.zeroProgress);
        const nowPt = pointOnPath(dynamicProgress);
        const color = colorForProgress(dynamicProgress);
        const zone = zoneForProgress(dynamicProgress);

        setMarker(nowHalo, nowPt.x, nowPt.y);
        setMarker(nowMarker, nowPt.x, nowPt.y);
        setMarker(nowCore, nowPt.x, nowPt.y);
        nowMarker.setAttribute('fill', color);
        nowHalo.setAttribute('fill', zone === 'Awake' ? 'rgba(232,213,163,0.14)' : 'rgba(74,111,165,0.16)');

        clockReadout.textContent = formatClock(now);
        phaseReadout.textContent = `${(dynamicProgress * 100).toFixed(1)}%`;
        zoneReadout.textContent = zone;
        statusLine.textContent = `${formatClock(now)} · cycle ${state.cycleHours.toFixed(1)}h · offset ${(state.zeroProgress * 360).toFixed(1)}°`;

        raf = requestAnimationFrame(render);
      }

      function onDragStart(event) {
        dragging = true;
        svg.setPointerCapture(event.pointerId);
        onDragMove(event);
      }

      function onDragMove(event) {
        if (!dragging) return;
        const pt = svgPointFromClient(event.clientX, event.clientY);
        state.zeroProgress = nearestProgressFromPoint(pt.x, pt.y);
        updateStatic();
        save();
      }

      function onDragEnd(event) {
        if (!dragging) return;
        dragging = false;
        try { svg.releasePointerCapture(event.pointerId); } catch (_) {}
      }

      function toggleSheet() {
        state.sheetOpen = !state.sheetOpen;
        updateSheetState();
        save();
      }

      load();
      updateStatic();
      render();

      cycleSlider.addEventListener('input', () => {
        state.cycleHours = clamp(parseFloat(cycleSlider.value), 15, 30);
        updateStatic();
        save();
      });

      zeroMarker.addEventListener('pointerdown', onDragStart);
      zeroHalo.addEventListener('pointerdown', onDragStart);
      zeroText.addEventListener('pointerdown', onDragStart);
      svg.addEventListener('pointermove', onDragMove);
      svg.addEventListener('pointerup', onDragEnd);
      svg.addEventListener('pointercancel', onDragEnd);
      svg.addEventListener('pointerleave', onDragEnd);

      sheetHeader.addEventListener('click', toggleSheet);
      sheetHeader.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          toggleSheet();
        }
      });
      sheetToggle.addEventListener('click', toggleSheet);

      window.addEventListener('visibilitychange', () => {
        if (document.hidden && raf) {
          cancelAnimationFrame(raf);
          raf = null;
          return;
        }
        if (!document.hidden && !raf) render();
      });
    })();
  </script>
</body>
</html>
