<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Circadian Clock GPT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0c;
      --panel: rgba(18, 18, 24, 0.6);
      --line: rgba(255,255,255,0.08);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.56);
      --gold: #e8d5a3;
      --blue: #4a6fa5;
      --shadow: 0 24px 80px rgba(0,0,0,0.34);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      background:
        radial-gradient(circle at 50% 12%, rgba(232, 213, 163, 0.11), transparent 24%),
        radial-gradient(circle at 50% 82%, rgba(74, 111, 165, 0.16), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0));
    }

    body::after {
      opacity: 0.08;
      background-image:
        repeating-radial-gradient(circle at 20% 30%, rgba(255,255,255,0.9) 0 0.6px, transparent 0.8px 6px),
        repeating-radial-gradient(circle at 80% 70%, rgba(255,255,255,0.8) 0 0.5px, transparent 0.7px 5px);
      mix-blend-mode: soft-light;
    }

    .app {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 18px 16px calc(144px + var(--safe-bottom));
      isolation: isolate;
    }

    .hud {
      position: absolute;
      top: max(12px, calc(8px + env(safe-area-inset-top, 0px)));
      left: 16px;
      right: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 5;
      pointer-events: none;
    }

    .statusLine {
      pointer-events: auto;
      font-size: 11px;
      line-height: 1.3;
      color: rgba(255,255,255,0.58);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(14, 14, 20, 0.44);
      backdrop-filter: blur(10px);
      max-width: min(74vw, 360px);
    }

    .sheetToggle {
      pointer-events: auto;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(18,18,24,0.58);
      color: var(--text);
      backdrop-filter: blur(14px);
      border-radius: 999px;
      min-width: 46px;
      height: 46px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease;
    }

    .sheetToggle:active { transform: scale(0.98); }

    .clockWrap {
      width: min(100%, 460px);
      aspect-ratio: 0.72;
      display: grid;
      place-items: center;
      position: relative;
      z-index: 1;
    }

    svg {
      width: 100%;
      height: auto;
      overflow: visible;
      filter: drop-shadow(0 22px 80px rgba(0,0,0,0.42));
      touch-action: none;
      user-select: none;
    }

    .legend {
      position: absolute;
      inset: auto 0 18px 0;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 0 6px;
      font-size: 11px;
      color: var(--muted);
      z-index: 2;
      pointer-events: none;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .sheet {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(22,22,30,0.76), rgba(12,12,16,0.62));
      backdrop-filter: blur(18px) saturate(130%);
      box-shadow: var(--shadow);
      transform: translateY(calc(100% - 72px));
      transition: transform 260ms ease;
      overflow: hidden;
    }

    .sheet.open { transform: translateY(0); }

    .sheetHeader {
      padding: 12px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      cursor: pointer;
    }

    .sheetHandle {
      width: 44px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      margin: 0 auto;
    }

    .sheetTitleRow {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }

    .sheetTitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 27px;
      margin: 0;
    }

    .sheetBody {
      padding: 6px 16px calc(18px + var(--safe-bottom));
      display: grid;
      gap: 16px;
    }

    .row {
      display: grid;
      gap: 10px;
    }

    .rowHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .metric {
      color: var(--text);
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    .valueBig {
      font-size: clamp(30px, 10vw, 44px);
      line-height: 0.9;
      letter-spacing: -0.04em;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #d4c096;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .miniCard {
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      padding: 12px;
    }

    .miniLabel {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .miniValue {
      font-size: 18px;
      line-height: 1.2;
    }

    .hint {
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.025);
      padding: 12px;
    }

    @media (max-width: 480px) and (orientation: portrait) {
      .app {
        padding: 10px 10px calc(156px + var(--safe-bottom));
      }
      .hud {
        top: max(8px, calc(4px + env(safe-area-inset-top, 0px)));
        left: 10px;
        right: 10px;
        gap: 8px;
      }
      .statusLine {
        font-size: 10px;
        padding: 6px 8px;
        color: rgba(255,255,255,0.52);
        border-color: rgba(255,255,255,0.07);
        background: rgba(12, 12, 17, 0.34);
        max-width: min(68vw, 300px);
      }
      .sheetToggle {
        min-width: 40px;
        height: 40px;
        padding: 0 13px;
      }
      .clockWrap {
        width: min(94vw, 360px);
        width: min(94vw, 360px, max(216px, calc((100dvh - 300px) * 0.72)));
        margin-top: 0;
        transform: translateY(24px) scale(0.955);
        transform-origin: center center;
      }
      .legend {
        inset: auto 0 10px 0;
        font-size: 10px;
        padding: 0 2px;
      }
      .legend span {
        padding: 6px 8px;
        border-color: rgba(255,255,255,0.06);
        background: rgba(255,255,255,0.02);
      }
      .sheet {
        bottom: 10px;
        transform: translateY(calc(100% - 68px));
      }
    }

    @media (min-width: 760px) {
      .app {
        padding-bottom: calc(190px + var(--safe-bottom));
      }
      .sheet {
        left: 50%;
        right: auto;
        width: min(680px, calc(100vw - 24px));
        transform: translate(-50%, calc(100% - 78px));
      }
      .sheet.open {
        transform: translate(-50%, 0);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hud">
      <div class="statusLine" id="statusLine">--:--:-- · cycle --h · offset --°</div>
      <button class="sheetToggle" id="sheetToggle" type="button" aria-label="設定を開く">⚙︎</button>
    </div>

    <div class="clockWrap">
      <svg id="clockSvg" viewBox="0 0 360 720" aria-label="縦8の字サーカディアンクロック" role="img">
        <defs>
          <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
          <filter id="tinyGlow" x="-100%" y="-100%" width="300%" height="300%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
          <linearGradient id="goldStroke" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#f5e9c8" />
            <stop offset="100%" stop-color="#d4bb7f" />
          </linearGradient>
          <linearGradient id="blueStroke" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#79a2dd" />
            <stop offset="100%" stop-color="#3d5b88" />
          </linearGradient>
        </defs>

        <g opacity="0.2">
          <path id="awakeThinTrack" d="" fill="none" stroke="url(#goldStroke)" stroke-width="1.5" />
          <path id="sleepThinTrack" d="" fill="none" stroke="url(#blueStroke)" stroke-width="1.5" />
        </g>

        <g opacity="0.85">
          <path id="awakeBoldTrack" d="" fill="none" stroke="url(#goldStroke)" stroke-width="10" stroke-linecap="round" filter="url(#softGlow)" />
          <path id="sleepBoldTrack" d="" fill="none" stroke="url(#blueStroke)" stroke-width="10" stroke-linecap="round" filter="url(#softGlow)" />
        </g>

        <g opacity="0.3">
          <line id="midLine" x1="64" y1="338" x2="296" y2="338" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
        </g>

        <g id="labels" font-family="JetBrains Mono, monospace" font-size="13" fill="rgba(255,255,255,0.65)">
          <text id="label0" x="180" y="76" text-anchor="middle">0</text>
          <text id="label6" x="314" y="344" text-anchor="middle">6</text>
          <text id="label12" x="180" y="598" text-anchor="middle">12</text>
          <text id="label18" x="46" y="344" text-anchor="middle">18</text>
        </g>

        <g id="markers">
          <circle id="zeroHalo" cx="180" cy="102" r="17" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)" stroke-width="1" />
          <circle id="zeroMarker" cx="180" cy="102" r="9" fill="#0a0a0c" stroke="#ffffff" stroke-width="2.5" filter="url(#tinyGlow)" />
          <text id="zeroText" x="180" y="107" font-family="JetBrains Mono, monospace" font-size="11" fill="rgba(255,255,255,0.92)" text-anchor="middle">0</text>

          <circle id="nowHalo" cx="180" cy="102" r="19" fill="rgba(255,255,255,0.06)" />
          <circle id="nowMarker" cx="180" cy="102" r="11" fill="#ffffff" filter="url(#tinyGlow)" />
          <circle id="nowCore" cx="180" cy="102" r="4" fill="#0a0a0c" />
        </g>
      </svg>

      <div class="legend">
        <span><i class="dot" style="background:#e8d5a3"></i>覚醒ゾーン</span>
        <span><i class="dot" style="background:#4a6fa5"></i>睡眠ゾーン</span>
      </div>
    </div>
  </div>

  <section class="sheet open" id="sheet">
    <div class="sheetHeader" id="sheetHeader" role="button" aria-expanded="true" tabindex="0">
      <div class="sheetHandle"></div>
      <div class="sheetTitleRow">
        <h2 class="sheetTitle">Settings</h2>
        <div class="metric" id="cycleReadout">25.0 h cycle</div>
      </div>
    </div>

    <div class="sheetBody">
      <div class="row">
        <div class="rowHeader">
          <span>現在時刻</span>
          <span class="metric" id="clockReadout">--:--:--</span>
        </div>
      </div>

      <div class="row">
        <div class="rowHeader">
          <span>サイクル時間（合計）</span>
          <span class="metric" id="cycleTotalReadout">25.0h</span>
        </div>
      </div>

      <div class="row">
        <div class="rowHeader">
          <span>睡眠時間</span>
          <span class="metric" id="sleepSliderReadout">9.0h</span>
        </div>
        <input id="sleepSlider" type="range" min="4" max="14" step="0.25" value="9" />
      </div>

      <div class="row">
        <div class="rowHeader">
          <span>覚醒時間</span>
          <span class="metric" id="awakeSliderReadout">16.0h</span>
        </div>
        <input id="awakeSlider" type="range" min="8" max="20" step="0.25" value="16" />
      </div>

    </div>
  </section>

  <script>
    (() => {
      const STORAGE_KEY = 'circadian-clock-v1';

      const svg = document.getElementById('clockSvg');
      const zeroMarker = document.getElementById('zeroMarker');
      const zeroHalo = document.getElementById('zeroHalo');
      const zeroText = document.getElementById('zeroText');
      const nowMarker = document.getElementById('nowMarker');
      const nowHalo = document.getElementById('nowHalo');
      const nowCore = document.getElementById('nowCore');
      const sleepSlider = document.getElementById('sleepSlider');
      const awakeSlider = document.getElementById('awakeSlider');
      const cycleReadout = document.getElementById('cycleReadout');
      const cycleTotalReadout = document.getElementById('cycleTotalReadout');
      const sleepSliderReadout = document.getElementById('sleepSliderReadout');
      const awakeSliderReadout = document.getElementById('awakeSliderReadout');
      const clockReadout = document.getElementById('clockReadout');
      const statusLine = document.getElementById('statusLine');
      const hud = document.querySelector('.hud');
      const sheet = document.getElementById('sheet');
      const sheetHeader = document.getElementById('sheetHeader');
      const sheetToggle = document.getElementById('sheetToggle');
      const awakeThinTrack = document.getElementById('awakeThinTrack');
      const sleepThinTrack = document.getElementById('sleepThinTrack');
      const awakeBoldTrack = document.getElementById('awakeBoldTrack');
      const sleepBoldTrack = document.getElementById('sleepBoldTrack');
      const midLine = document.getElementById('midLine');
      const label0 = document.getElementById('label0');
      const label6 = document.getElementById('label6');
      const label12 = document.getElementById('label12');
      const label18 = document.getElementById('label18');

      const sleepHoursRange = { min: 4, max: 14 };
      const awakeHoursRange = { min: 8, max: 20 };
      const baseLoop = {
        cx: 180,
        centerY: 338,
        rx: 128,
        baseRy: 138,
      };
      const minCycleHours = sleepHoursRange.min + awakeHoursRange.min;
      const maxCycleHours = sleepHoursRange.max + awakeHoursRange.max;
      const verticalScaleRange = { min: 1.04, max: 1.34 };
      const horizontalScaleRange = { min: 0.98, max: 1.06 };
      const ratioStrength = 0.52;
      const ratioHorizontalStrength = 0.12;
      const displayFit = { x: 1.12, y: 1.48, yOffset: -32 };
      const ANA_TOP_PHASE_SHIFT = 172 / 365; // Around June solstice; keeps p=0 near top lobe.
      const ANA_EQTIME_NORMALIZER_MIN = 16; // +/-16 min is a practical horizontal normalization.

      const localEpoch = new Date(1970, 0, 1, 0, 0, 0, 0).getTime();

      let state = {
        sleepHours: 9,
        awakeHours: 16,
        zeroProgress: 0,
        sheetOpen: true,
      };

      let dragging = false;
      let dragProgressContinuous = 0;
      let dragPointerId = null;
      let dragLastPoint = null;
      let dragTravelDirection = 0;
      let activeGeometry = null;
      let runtimeFit = { scale: 1, xShift: 0, yShift: 0 };
      let fitDirty = true;
      let raf = null;
      let lastLayoutWidth = Math.round(window.innerWidth || 0);
      let lastLayoutPortrait = false;

      function load() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const saved = JSON.parse(raw);
          const hasSleep = typeof saved.sleepHours === 'number';
          const hasAwake = typeof saved.awakeHours === 'number';
          if (hasSleep) state.sleepHours = clamp(saved.sleepHours, sleepHoursRange.min, sleepHoursRange.max);
          if (hasAwake) state.awakeHours = clamp(saved.awakeHours, awakeHoursRange.min, awakeHoursRange.max);
          if (!hasSleep && !hasAwake && typeof saved.cycleHours === 'number') {
            const migratedTotal = clamp(saved.cycleHours, minCycleHours, maxCycleHours);
            state.awakeHours = clamp(migratedTotal * (16 / 25), awakeHoursRange.min, awakeHoursRange.max);
            state.sleepHours = clamp(migratedTotal - state.awakeHours, sleepHoursRange.min, sleepHoursRange.max);
          }
          if (typeof saved.zeroProgress === 'number') state.zeroProgress = wrap(saved.zeroProgress);
          if (typeof saved.sheetOpen === 'boolean') state.sheetOpen = saved.sheetOpen;
        } catch (_) {}
      }

      function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function wrap(value) {
        return ((value % 1) + 1) % 1;
      }

      function smoothstep01(value) {
        const t = clamp(value, 0, 1);
        return t * t * (3 - 2 * t);
      }

      function totalCycleHours() {
        return state.sleepHours + state.awakeHours;
      }

      function cycleFractions() {
        const total = totalCycleHours();
        const awake = total > 0 ? clamp(state.awakeHours / total, 0.2, 0.85) : 0.5;
        const sleep = 1 - awake;
        return { awake, sleep, awakeHalf: awake * 0.5 };
      }

      function verticalScaleForCycle(cycleHours) {
        const normalized = (cycleHours - minCycleHours) / (maxCycleHours - minCycleHours);
        const eased = smoothstep01(normalized);
        return verticalScaleRange.min + (verticalScaleRange.max - verticalScaleRange.min) * eased;
      }

      function horizontalScaleForCycle(cycleHours) {
        const normalized = (cycleHours - minCycleHours) / (maxCycleHours - minCycleHours);
        const eased = smoothstep01(normalized);
        return horizontalScaleRange.min + (horizontalScaleRange.max - horizontalScaleRange.min) * eased;
      }

      function computeFigureGeometry() {
        const total = totalCycleHours();
        const verticalScale = verticalScaleForCycle(total);
        const horizontalScale = horizontalScaleForCycle(total);
        const awakeRatio = total > 0 ? state.awakeHours / total : 0.5;
        const ratioDelta = awakeRatio - 0.5;
        const ratioInfluence = clamp(ratioDelta * 2, -1, 1);

        // Keep perceived total size stable while changing upper/lower character.
        const upperRatioRaw = clamp(1 + ratioInfluence * ratioStrength, 0.86, 1.42);
        const lowerRatioRaw = clamp(1 - ratioInfluence * (ratioStrength * 0.68), 0.78, 1.2);
        const ratioMean = (upperRatioRaw + lowerRatioRaw) * 0.5;
        const upperRatioScale = upperRatioRaw / ratioMean;
        const lowerRatioScale = lowerRatioRaw / ratioMean;

        const upperRatioXRaw = clamp(1 + ratioInfluence * ratioHorizontalStrength, 0.92, 1.12);
        const lowerRatioXRaw = clamp(1 - ratioInfluence * (ratioHorizontalStrength * 0.56), 0.94, 1.1);
        const ratioXMean = (upperRatioXRaw + lowerRatioXRaw) * 0.5;
        const upperRatioXScale = upperRatioXRaw / ratioXMean;
        const lowerRatioXScale = lowerRatioXRaw / ratioXMean;
        const upperRx = baseLoop.rx * horizontalScale * upperRatioXScale;
        const lowerRx = baseLoop.rx * horizontalScale * lowerRatioXScale;
        const baseVertical = baseLoop.baseRy * verticalScale;
        const upperRy = baseVertical * upperRatioScale;
        const lowerRy = baseVertical * lowerRatioScale;
        const separation = upperRy + lowerRy;
        const ratioBalance = (upperRy - lowerRy) / Math.max(upperRy + lowerRy, 1e-6);
        const midY = baseLoop.centerY + ratioBalance * 10;

        const figure = {
          total,
          midY,
          ratioBalance,
          upper: { cx: baseLoop.cx, cy: midY - separation * 0.5, rx: upperRx, ry: upperRy },
          lower: { cx: baseLoop.cx, cy: midY + separation * 0.5, rx: lowerRx, ry: lowerRy },
        };

        const neutralMidY = baseLoop.centerY;
        const neutralFigure = {
          total,
          midY: neutralMidY,
          ratioBalance: 0,
          upper: { cx: baseLoop.cx, cy: neutralMidY - baseVertical, rx: baseLoop.rx * horizontalScale, ry: baseVertical },
          lower: { cx: baseLoop.cx, cy: neutralMidY + baseVertical, rx: baseLoop.rx * horizontalScale, ry: baseVertical },
        };

        const actualBounds = measureRawBounds(figure, 168);
        const targetBounds = measureRawBounds(neutralFigure, 168);
        const normalizeX = clamp(targetBounds.width / Math.max(actualBounds.width, 1e-6), 0.9, 1.15);
        const normalizeY = clamp(targetBounds.height / Math.max(actualBounds.height, 1e-6), 0.92, 1.18);
        const centerOffsetY = (baseLoop.centerY - actualBounds.cy) * 0.38;

        return {
          ...figure,
          normalizeX,
          normalizeY,
          centerOffsetY,
          rawCenterY: actualBounds.cy,
        };
      }

      function currentFigureGeometry() {
        if (!activeGeometry) activeGeometry = computeFigureGeometry();
        return activeGeometry;
      }

      function phaseForProgress(progress) {
        const fractions = cycleFractions();
        const p = wrap(progress);
        if (p < fractions.awakeHalf) {
          const t = p / fractions.awakeHalf;
          return t * (Math.PI * 0.5);
        }
        if (p < fractions.awakeHalf + fractions.sleep) {
          const t = (p - fractions.awakeHalf) / fractions.sleep;
          return Math.PI * 0.5 + t * Math.PI;
        }
        const t = (p - (fractions.awakeHalf + fractions.sleep)) / fractions.awakeHalf;
        return Math.PI * 1.5 + t * (Math.PI * 0.5);
      }

      function rawPointAtPhase(phase, figure) {
        // Solar analemma approximation (equation of time + declination).
        // This yields the characteristic non-symmetric figure-eight.
        const yearPhase = wrap((phase / (Math.PI * 2)) + ANA_TOP_PHASE_SHIFT);
        const dayOfYear = yearPhase * 365;
        const B = (2 * Math.PI / 364) * (dayOfYear - 81);
        const equationMinutes =
          9.87 * Math.sin(2 * B) -
          7.53 * Math.cos(B) -
          1.5 * Math.sin(B);
        const declinationDeg = 23.45 * Math.sin((2 * Math.PI / 365) * (dayOfYear - 81));

        const xAnalemma = clamp(equationMinutes / ANA_EQTIME_NORMALIZER_MIN, -1.25, 1.25);
        const yAnalemma = clamp(declinationDeg / 23.45, -1.05, 1.05);
        const topBlend = smoothstep01((yAnalemma + 1) * 0.5);
        const rx = figure.lower.rx + (figure.upper.rx - figure.lower.rx) * topBlend;
        const ry = figure.lower.ry + (figure.upper.ry - figure.lower.ry) * topBlend;
        // Keep analemma equation shape, but avoid a visually heavy lower bulb.
        const lowerSlim = 0.82 + 0.18 * topBlend;
        const xTerm = xAnalemma * lowerSlim;
        const yTerm = yAnalemma;
        return {
          x: baseLoop.cx + rx * xTerm * 0.98,
          y: figure.midY - yTerm * ry,
        };
      }

      function measureRawBounds(figure, samples = 168) {
        let minX = Infinity;
        let maxX = -Infinity;
        let minY = Infinity;
        let maxY = -Infinity;
        for (let i = 0; i <= samples; i += 1) {
          const phase = (Math.PI * 2 * i) / samples;
          const pt = rawPointAtPhase(phase, figure);
          if (pt.x < minX) minX = pt.x;
          if (pt.x > maxX) maxX = pt.x;
          if (pt.y < minY) minY = pt.y;
          if (pt.y > maxY) maxY = pt.y;
        }
        return {
          width: maxX - minX,
          height: maxY - minY,
          cx: (minX + maxX) * 0.5,
          cy: (minY + maxY) * 0.5,
        };
      }

      function basePointAtPhase(phase) {
        const figure = currentFigureGeometry();
        const raw = rawPointAtPhase(phase, figure);
        const normalizedX = baseLoop.cx + (raw.x - baseLoop.cx) * figure.normalizeX;
        const normalizedY = figure.rawCenterY + (raw.y - figure.rawCenterY) * figure.normalizeY + figure.centerOffsetY;
        return {
          x: baseLoop.cx + (normalizedX - baseLoop.cx) * displayFit.x,
          y: baseLoop.centerY + (normalizedY - baseLoop.centerY) * displayFit.y + displayFit.yOffset,
        };
      }

      function basePointOnPath(progress) {
        return basePointAtPhase(phaseForProgress(progress));
      }

      function measureBasePathBounds(samples = 360) {
        let minX = Infinity;
        let maxX = -Infinity;
        let minY = Infinity;
        let maxY = -Infinity;
        for (let i = 0; i <= samples; i += 1) {
          const pt = basePointOnPath(i / samples);
          if (pt.x < minX) minX = pt.x;
          if (pt.x > maxX) maxX = pt.x;
          if (pt.y < minY) minY = pt.y;
          if (pt.y > maxY) maxY = pt.y;
        }
        return { minX, maxX, minY, maxY };
      }

      function isPhonePortrait() {
        return window.matchMedia('(max-width: 700px) and (orientation: portrait)').matches;
      }

      function requestRefitForLayoutChange(force = false) {
        const currentWidth = Math.round(window.innerWidth || document.documentElement.clientWidth || 0);
        const currentPortrait = isPhonePortrait();
        const widthChanged = Math.abs(currentWidth - lastLayoutWidth) >= 2;
        const portraitChanged = currentPortrait !== lastLayoutPortrait;
        if (!force && !widthChanged && !portraitChanged) return;
        lastLayoutWidth = currentWidth;
        lastLayoutPortrait = currentPortrait;
        fitDirty = true;
        updateStatic();
      }

      function updateRuntimeFit() {
        const vb = svg.viewBox.baseVal;
        const rect = svg.getBoundingClientRect();
        const pxToVbY = vb.height / Math.max(rect.height, 1);
        const pxToVbX = vb.width / Math.max(rect.width, 1);
        const portrait = isPhonePortrait();

        // Derive effective top/bottom limits from real overlay layout, not constants only.
        let topLimitPx = rect.top + (portrait ? 12 : 10);
        if (hud) {
          const hudRect = hud.getBoundingClientRect();
          topLimitPx = Math.max(topLimitPx, hudRect.bottom + (portrait ? 10 : 8));
        }
        let bottomLimitPx = rect.bottom - (portrait ? 10 : 8);
        const sheetRect = sheet.getBoundingClientRect();
        if (sheetRect.top < rect.bottom) {
          bottomLimitPx = Math.min(bottomLimitPx, sheetRect.top - (portrait ? 14 : 10));
        }
        if (bottomLimitPx <= topLimitPx + 20) {
          bottomLimitPx = topLimitPx + 20;
        }
        const topLimit = vb.y + (topLimitPx - rect.top) * pxToVbY;
        const bottomLimit = vb.y + (bottomLimitPx - rect.top) * pxToVbY;
        const sidePadPx = portrait ? 12 : 10;
        const leftLimit = vb.x + sidePadPx * pxToVbX;
        const rightLimit = vb.x + vb.width - sidePadPx * pxToVbX;

        const bounds = measureBasePathBounds();
        const topPoint = basePointOnPath(0);
        const leftCritical = bounds.minX - 12;
        const rightCritical = bounds.maxX + 12;
        const topCritical = Math.min(bounds.minY - 22, topPoint.y - 38);
        const bottomCritical = bounds.maxY + 24;
        const criticalWidth = rightCritical - leftCritical;
        const criticalSpan = bottomCritical - topCritical;
        const availableSpan = bottomLimit - topLimit;
        const availableWidth = rightLimit - leftLimit;
        const scaleY = availableSpan / Math.max(criticalSpan, 1e-6);
        const scaleX = availableWidth / Math.max(criticalWidth, 1e-6);
        const scale = Math.min(1, scaleX, scaleY);

        const centerY = baseLoop.centerY;
        const centerX = baseLoop.cx;
        const scaledLeft = centerX + (leftCritical - centerX) * scale;
        const scaledRight = centerX + (rightCritical - centerX) * scale;
        const scaledTop = centerY + (topCritical - centerY) * scale;
        const scaledBottom = centerY + (bottomCritical - centerY) * scale;
        const scaledCx = (scaledLeft + scaledRight) * 0.5;
        const scaledCy = (scaledTop + scaledBottom) * 0.5;
        const measureFittedBoundsX = (xShift, samples = 260) => {
          let minX = Infinity;
          let maxX = -Infinity;
          for (let i = 0; i <= samples; i += 1) {
            const base = basePointOnPath(i / samples);
            const x = centerX + (base.x - centerX) * scale + xShift;
            if (x < minX) minX = x;
            if (x > maxX) maxX = x;
          }
          return { minX, maxX };
        };
        const clampXShiftToLimits = (candidate) => {
          let next = candidate;
          const boundsX = measureFittedBoundsX(next);
          if (boundsX.minX < leftLimit) next += leftLimit - boundsX.minX;
          if (boundsX.maxX > rightLimit) next -= boundsX.maxX - rightLimit;
          return next;
        };
        const targetCx = (leftLimit + rightLimit) * 0.5;
        const targetCy = (topLimit + bottomLimit) * 0.5;
        let xShift = targetCx - scaledCx;
        xShift = clampXShiftToLimits(xShift);
        const centeredBounds = measureFittedBoundsX(xShift);
        xShift += targetCx - ((centeredBounds.minX + centeredBounds.maxX) * 0.5);
        xShift = clampXShiftToLimits(xShift);
        let yShift = targetCy - scaledCy;
        if (scaledTop < topLimit) yShift += topLimit - scaledTop;
        if (scaledBottom + yShift > bottomLimit) {
          yShift -= (scaledBottom + yShift) - bottomLimit;
        }
        if (scaledTop + yShift < topLimit) {
          yShift += topLimit - (scaledTop + yShift);
        }
        runtimeFit = { scale, xShift, yShift };
        fitDirty = false;
      }

      function pointAtPhase(phase) {
        const base = basePointAtPhase(phase);
        return {
          x: baseLoop.cx + (base.x - baseLoop.cx) * runtimeFit.scale + runtimeFit.xShift,
          y: baseLoop.centerY + (base.y - baseLoop.centerY) * runtimeFit.scale + runtimeFit.yShift,
        };
      }

      function pointOnPath(progress) {
        return pointAtPhase(phaseForProgress(progress));
      }

      function zoneForProgress(progress) {
        const fractions = cycleFractions();
        const p = wrap(progress);
        return p < fractions.awakeHalf || p >= fractions.awakeHalf + fractions.sleep ? 'Awake' : 'Sleep';
      }

      function colorForProgress(progress) {
        const zone = zoneForProgress(progress);
        return zone === 'Awake' ? '#e8d5a3' : '#4a6fa5';
      }

      function tangentOnPath(progress) {
        const eps = 0.0008;
        const a = pointOnPath(progress - eps);
        const b = pointOnPath(progress + eps);
        const tx = b.x - a.x;
        const ty = b.y - a.y;
        const len = Math.hypot(tx, ty) || 1;
        return { x: tx / len, y: ty / len };
      }

      function pathSpeedOnProgress(progress) {
        const eps = 0.0008;
        const a = pointOnPath(progress - eps);
        const b = pointOnPath(progress + eps);
        const dist = Math.hypot(b.x - a.x, b.y - a.y);
        return dist / (2 * eps);
      }

      function distanceToProgressSq(progress, point) {
        const candidate = pointOnPath(progress);
        const dx = candidate.x - point.x;
        const dy = candidate.y - point.y;
        return dx * dx + dy * dy;
      }

      function nearestProgressNear(point, centerProgress, windowSize = 0.16) {
        const samples = 24;
        let bestProgress = centerProgress;
        let bestDistance = distanceToProgressSq(centerProgress, point);

        for (let i = -samples; i <= samples; i += 1) {
          const progress = centerProgress + (i / samples) * windowSize;
          const distance = distanceToProgressSq(progress, point);
          if (distance < bestDistance) {
            bestDistance = distance;
            bestProgress = progress;
          }
        }

        let step = windowSize / samples;
        for (let i = 0; i < 8; i += 1) {
          const left = bestProgress - step;
          const right = bestProgress + step;
          const leftDistance = distanceToProgressSq(left, point);
          const rightDistance = distanceToProgressSq(right, point);
          if (leftDistance < bestDistance && leftDistance <= rightDistance) {
            bestDistance = leftDistance;
            bestProgress = left;
          } else if (rightDistance < bestDistance) {
            bestDistance = rightDistance;
            bestProgress = right;
          }
          step *= 0.5;
        }

        return bestProgress;
      }

      function svgPointFromClient(clientX, clientY) {
        const rect = svg.getBoundingClientRect();
        const viewBox = svg.viewBox.baseVal;
        const scaleX = viewBox.width / rect.width;
        const scaleY = viewBox.height / rect.height;
        return {
          x: (clientX - rect.left) * scaleX + viewBox.x,
          y: (clientY - rect.top) * scaleY + viewBox.y,
        };
      }

      function formatClock(date) {
        return new Intl.DateTimeFormat('ja-JP', {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false,
        }).format(date);
      }

      function updateSheetState() {
        sheet.classList.toggle('open', state.sheetOpen);
        sheetHeader.setAttribute('aria-expanded', String(state.sheetOpen));
      }

      function buildPathSegment(startProgress, endProgress, samples = 96) {
        let d = '';
        for (let i = 0; i <= samples; i += 1) {
          const p = startProgress + ((endProgress - startProgress) * i) / samples;
          const pt = pointOnPath(p);
          d += `${i === 0 ? 'M' : 'L'} ${pt.x.toFixed(2)} ${pt.y.toFixed(2)} `;
        }
        return d.trim();
      }

      function awakeTrackPath() {
        const fractions = cycleFractions();
        const first = buildPathSegment(0, fractions.awakeHalf, 88);
        const second = buildPathSegment(fractions.awakeHalf + fractions.sleep, 1, 88);
        return `${first} ${second}`.trim();
      }

      function sleepTrackPath() {
        const fractions = cycleFractions();
        return buildPathSegment(fractions.awakeHalf, fractions.awakeHalf + fractions.sleep, 180);
      }

      function horizontalExtentOnPath(samples = 200) {
        let maxExtent = 0;
        for (let i = 0; i <= samples; i += 1) {
          const pt = pointOnPath(i / samples);
          maxExtent = Math.max(maxExtent, Math.abs(pt.x - baseLoop.cx));
        }
        return maxExtent;
      }

      function updateFigureLayout() {
        activeGeometry = computeFigureGeometry();
        const fractions = cycleFractions();

        const awakePath = awakeTrackPath();
        const sleepPath = sleepTrackPath();
        awakeThinTrack.setAttribute('d', awakePath);
        sleepThinTrack.setAttribute('d', sleepPath);
        awakeBoldTrack.setAttribute('d', awakePath);
        sleepBoldTrack.setAttribute('d', sleepPath);

        const sideExtent = horizontalExtentOnPath();
        const neckA = pointOnPath(fractions.awakeHalf);
        const neckB = pointOnPath(fractions.awakeHalf + fractions.sleep);
        const neckY = (neckA.y + neckB.y) * 0.5;
        const topPoint = pointOnPath(0);
        const bottomPoint = pointOnPath(fractions.awakeHalf + fractions.sleep * 0.5);
        midLine.setAttribute('x1', baseLoop.cx - sideExtent);
        midLine.setAttribute('x2', baseLoop.cx + sideExtent);
        midLine.setAttribute('y1', neckY);
        midLine.setAttribute('y2', neckY);
        label0.setAttribute('x', baseLoop.cx);
        label12.setAttribute('x', baseLoop.cx);
        label6.setAttribute('x', baseLoop.cx + sideExtent + 16);
        label18.setAttribute('x', baseLoop.cx - sideExtent - 16);
        label0.setAttribute('y', topPoint.y - 26);
        label6.setAttribute('y', neckY + 6);
        label12.setAttribute('y', bottomPoint.y + 24);
        label18.setAttribute('y', neckY + 6);
      }

      function formatDialHours(value) {
        const rounded = Math.round(value * 10) / 10;
        return Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(1);
      }

      function updateDialLabels() {
        const quarter = totalCycleHours() / 4;
        label0.textContent = '0';
        label6.textContent = formatDialHours(quarter);
        label12.textContent = formatDialHours(quarter * 2);
        label18.textContent = formatDialHours(quarter * 3);
      }

      function updateStatic() {
        if (fitDirty) updateRuntimeFit();
        const total = totalCycleHours();
        updateFigureLayout();
        updateDialLabels();
        sleepSlider.value = String(state.sleepHours);
        awakeSlider.value = String(state.awakeHours);
        cycleReadout.textContent = `${total.toFixed(1)} h cycle`;
        cycleTotalReadout.textContent = `${total.toFixed(1)}h`;
        sleepSliderReadout.textContent = `${state.sleepHours.toFixed(1)}h`;
        awakeSliderReadout.textContent = `${state.awakeHours.toFixed(1)}h`;
        const zeroPt = pointOnPath(state.zeroProgress);
        setMarker(zeroHalo, zeroPt.x, zeroPt.y);
        setMarker(zeroMarker, zeroPt.x, zeroPt.y);
        zeroText.setAttribute('x', zeroPt.x);
        zeroText.setAttribute('y', zeroPt.y + 4);
        updateSheetState();
      }

      function setMarker(el, x, y) {
        el.setAttribute('cx', x);
        el.setAttribute('cy', y);
      }

      function render() {
        const now = new Date();
        const totalCycle = totalCycleHours();
        const cycleMs = totalCycle * 60 * 60 * 1000;
        const elapsedMs = Date.now() - localEpoch;
        const dynamicProgress = wrap(elapsedMs / cycleMs + state.zeroProgress);
        const nowPt = pointOnPath(dynamicProgress);
        const color = colorForProgress(dynamicProgress);
        const zone = zoneForProgress(dynamicProgress);

        setMarker(nowHalo, nowPt.x, nowPt.y);
        setMarker(nowMarker, nowPt.x, nowPt.y);
        setMarker(nowCore, nowPt.x, nowPt.y);
        nowMarker.setAttribute('fill', color);
        nowHalo.setAttribute('fill', zone === 'Awake' ? 'rgba(232,213,163,0.14)' : 'rgba(74,111,165,0.16)');

        clockReadout.textContent = formatClock(now);
        statusLine.textContent = `${formatClock(now)} · cycle ${totalCycle.toFixed(1)}h · offset ${(state.zeroProgress * 360).toFixed(1)}°`;

        raf = requestAnimationFrame(render);
      }

      function onDragStart(event) {
        if (dragging) return;
        event.preventDefault();
        const startPt = svgPointFromClient(event.clientX, event.clientY);
        dragging = true;
        dragPointerId = event.pointerId;
        dragProgressContinuous = state.zeroProgress;
        dragLastPoint = startPt;
        dragTravelDirection = 0;
        try { svg.setPointerCapture(event.pointerId); } catch (_) {}
        onDragMove(event);
      }

      function onDragMove(event) {
        if (!dragging || event.pointerId !== dragPointerId) return;
        event.preventDefault();
        const pt = svgPointFromClient(event.clientX, event.clientY);
        const lastPt = dragLastPoint || pt;
        const moveX = pt.x - lastPt.x;
        const moveY = pt.y - lastPt.y;
        const moveDistance = Math.hypot(moveX, moveY);
        if (moveDistance < 0.04) {
          dragLastPoint = pt;
          return;
        }
        const tangent = tangentOnPath(dragProgressContinuous);
        const projection = moveX * tangent.x + moveY * tangent.y;
        const speed = Math.max(pathSpeedOnProgress(dragProgressContinuous), 1e-6);
        const predictedProgress = dragProgressContinuous + projection / speed;
        const targetProgress = nearestProgressNear(pt, predictedProgress, 0.16);
        let delta = targetProgress - dragProgressContinuous;
        const catchupBoost = Math.abs(delta) * 0.7;
        const maxStep = clamp(0.02 + moveDistance * 0.003 + catchupBoost, 0.02, 0.18);
        delta = clamp(delta, -maxStep, maxStep);
        if (Math.abs(delta) > 0.0008) {
          dragTravelDirection = Math.sign(delta);
        }
        dragProgressContinuous += delta;
        dragLastPoint = pt;
        state.zeroProgress = wrap(dragProgressContinuous);
        updateStatic();
        save();
      }

      function onDragEnd(event) {
        if (!dragging || event.pointerId !== dragPointerId) return;
        dragging = false;
        dragPointerId = null;
        dragLastPoint = null;
        dragTravelDirection = 0;
        try { svg.releasePointerCapture(event.pointerId); } catch (_) {}
      }

      function toggleSheet() {
        state.sheetOpen = !state.sheetOpen;
        updateSheetState();
        fitDirty = true;
        updateStatic();
        save();
      }

      load();
      lastLayoutPortrait = isPhonePortrait();
      updateStatic();
      render();

      sleepSlider.addEventListener('input', () => {
        state.sleepHours = clamp(parseFloat(sleepSlider.value), sleepHoursRange.min, sleepHoursRange.max);
        fitDirty = true;
        updateStatic();
        save();
      });

      awakeSlider.addEventListener('input', () => {
        state.awakeHours = clamp(parseFloat(awakeSlider.value), awakeHoursRange.min, awakeHoursRange.max);
        fitDirty = true;
        updateStatic();
        save();
      });

      zeroMarker.addEventListener('pointerdown', onDragStart);
      zeroHalo.addEventListener('pointerdown', onDragStart);
      zeroText.addEventListener('pointerdown', onDragStart);
      svg.addEventListener('pointermove', onDragMove);
      svg.addEventListener('pointerup', onDragEnd);
      svg.addEventListener('pointercancel', onDragEnd);

      sheetHeader.addEventListener('click', toggleSheet);
      sheetHeader.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          toggleSheet();
        }
      });
      sheetToggle.addEventListener('click', toggleSheet);
      sheet.addEventListener('transitionend', () => {
        fitDirty = true;
        updateStatic();
      });

      window.addEventListener('visibilitychange', () => {
        if (document.hidden && raf) {
          cancelAnimationFrame(raf);
          raf = null;
          return;
        }
        if (!document.hidden && !raf) render();
      });

      window.addEventListener('resize', () => {
        requestRefitForLayoutChange();
      });
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
          requestRefitForLayoutChange();
        });
      }
    })();
  </script>
</body>
</html>
